# Projeto único: 55lab
#
# Site (só HTTP, porta 80):
#   docker compose up -d --build web
#
# Backend API + MySQL + fila de IA:
#   docker compose up -d mysql api queue
#   API: http://localhost:8000
#
# Produção com HTTPS + renovação SSL:
#   cp .env.example .env   # DOMAIN e CERTBOT_EMAIL
#   docker compose --profile production up -d --build
#   ./scripts/init-ssl.sh
name: 55lab

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-55lab}
      MYSQL_USER: ${MYSQL_USER:-55lab}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-55lab_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-55lab}", "-p${MYSQL_PASSWORD:-55lab_secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-55lab}
      DB_USERNAME: ${MYSQL_USER:-55lab}
      DB_PASSWORD: ${MYSQL_PASSWORD:-55lab_secret}
      QUEUE_CONNECTION: database
      EDITAL_AI_ENABLED: "true"
      EDITAL_AI_PROVIDER: ${EDITAL_AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - backend_config:/persist
      - backend_storage:/var/www/html/storage/app

  queue:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-55lab}
      DB_USERNAME: ${MYSQL_USER:-55lab}
      DB_PASSWORD: ${MYSQL_PASSWORD:-55lab_secret}
      QUEUE_CONNECTION: database
      EDITAL_AI_ENABLED: "true"
      EDITAL_AI_PROVIDER: ${EDITAL_AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=360"]
    volumes:
      - backend_config:/persist
      - backend_storage:/var/www/html/storage/app

  web:
    build: .
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    profiles: [production]
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  certbot_etc:
  certbot_www:
  mysql_data:
  backend_config:
  backend_storage:
