# Projeto único: 55lab
#
# Desenvolvimento (só HTTP, porta 80):
#   docker compose up -d --build
#
# Produção com HTTPS + renovação SSL:
#   cp .env.example .env   # DOMAIN e CERTBOT_EMAIL
#   docker compose --profile production up -d --build
#   ./scripts/init-ssl.sh
name: 55lab

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    profiles: [production]
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  certbot_etc:
  certbot_www:
